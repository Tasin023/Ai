<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARO</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark-dimmed.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<style>
:root{--bg:#07080D;--bg-side:#0B0D14;--bg-el:#0F1220;--glass:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--border-hi:rgba(255,255,255,0.14);--t1:#F2F4F8;--t2:#9DA3B5;--t3:#5C6178;--acc:#5B8CFF;--acc2:#B16BFF;--acc-g:linear-gradient(135deg,#5B8CFF,#B16BFF);--green:#3DDC84;--user-bg:#161A2C;--code-bg:#0A0C14}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);overflow:hidden;height:100vh;height:100dvh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#2a2d3a;border-radius:4px}
.font-display{font-family:'Space Grotesk',sans-serif}

/* ===== 3D ICO LOGO ===== */
.ico-3d-wrap{perspective:600px;perspective-origin:center center;display:inline-block}
.ico-3d{transform-style:preserve-3d;animation:ico3dSpin 14s linear infinite;will-change:transform}
@keyframes ico3dSpin{0%{transform:rotateX(-12deg) rotateY(0deg)}100%{transform:rotateX(-12deg) rotateY(360deg)}}
.ico-3d .face{position:absolute;backface-visibility:hidden;transform-origin:center center}
.ico-3d .face-f{transform:translateZ(18px)}.ico-3d .face-b{transform:rotateY(180deg) translateZ(18px)}
.ico-3d .face-l{transform:rotateY(-90deg) translateZ(18px)}.ico-3d .face-r{transform:rotateY(90deg) translateZ(18px)}
.ico-3d .face-t{transform:rotateX(90deg) translateZ(18px)}.ico-3d .face-bt{transform:rotateX(-90deg) translateZ(18px)}

/* ===== SPLASH ===== */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .9s ease,visibility .9s ease}
#splash.done{opacity:0;visibility:hidden;pointer-events:none}
#splash-canvas{position:absolute;inset:0;z-index:0}
.splash-content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center}
.splash-3d{width:120px;height:120px;opacity:0;animation:splashIcoIn 1.2s cubic-bezier(.16,1,.3,1) forwards .2s;filter:drop-shadow(0 0 50px rgba(91,140,255,0.4)) drop-shadow(0 0 100px rgba(177,107,255,0.15))}
@keyframes splashIcoIn{0%{opacity:0;transform:scale(.2) rotateY(0deg) rotateX(40deg)}60%{opacity:1;transform:scale(1.15) rotateY(200deg) rotateX(-5deg)}100%{opacity:1;transform:scale(1) rotateY(360deg) rotateX(0deg)}}
.splash-text{margin-top:32px;font-family:'Space Grotesk',sans-serif;font-size:48px;font-weight:700;letter-spacing:22px;opacity:0;animation:splashTxt .9s cubic-bezier(.16,1,.3,1) forwards 1s}
.splash-text span{background:linear-gradient(135deg,#5B8CFF,#B16BFF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
@keyframes splashTxt{0%{opacity:0;letter-spacing:50px;filter:blur(12px)}100%{opacity:1;letter-spacing:22px;filter:blur(0)}}
.splash-bar-w{margin-top:36px;width:220px;height:2px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden;opacity:0;animation:fadeUp .5s ease forwards 1.5s}
.splash-bar{height:100%;width:0%;background:var(--acc-g);border-radius:2px;animation:splashBar 1.5s ease forwards 1.6s}
@keyframes splashBar{to{width:100%}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.splash-sub{margin-top:14px;font-size:12px;letter-spacing:.08em;color:var(--t3);opacity:0;animation:fadeUp .5s ease forwards 1.8s}

/* ===== PARTICLES ===== */
#particles{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.45}

/* ===== GLASS ===== */
.glass{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--border)}

/* ===== SIDEBAR ===== */
#sidebar{position:fixed;left:0;top:0;bottom:0;width:280px;min-width:280px;background:var(--bg-side);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:40;transition:width 250ms ease,min-width 250ms ease,transform 250ms ease}
.sidebar-text{transition:opacity 180ms ease,width 180ms ease,margin 180ms ease;overflow:hidden;white-space:nowrap}
.conv-item{padding:10px 12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:10px;position:relative;transition:background .15s;border-left:3px solid transparent}
.conv-item:hover{background:rgba(255,255,255,0.04)}
.conv-item.active{background:rgba(91,140,255,0.06);border-left-color:var(--acc)}
.conv-item .ct{flex:1;overflow:hidden;text-overflow:ellipsis;font-size:14px;font-weight:500;color:var(--t2)}
.conv-item.active .ct{color:var(--t1)}
.conv-item .cd{opacity:0;background:none;border:none;color:var(--t3);cursor:pointer;padding:4px;font-size:11px;transition:opacity .15s,color .15s;flex-shrink:0}
.conv-item:hover .cd{opacity:1}.conv-item .cd:hover{color:#f87171}
@media(min-width:768px) and (max-width:1023px){
#sidebar{width:64px;min-width:64px}#sidebar:hover{width:280px;min-width:280px}
#sidebar:not(:hover) .sidebar-text{opacity:0;width:0;margin:0}
#sidebar:not(:hover) .conv-item{justify-content:center;padding:10px}
#sidebar:not(:hover) .cd{display:none}
}
@media(max-width:767px){#sidebar{transform:translateX(-100%)}#sidebar.open{transform:translateX(0)}}
#sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(6px);z-index:35;opacity:0;pointer-events:none;transition:opacity .25s}
#sidebar-overlay.open{opacity:1;pointer-events:all}

/* ===== MESSAGES ===== */
.msg-row{animation:msgIn .25s ease forwards}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-content{line-height:1.65;font-size:15.5px;color:var(--t1)}
.msg-content p{margin-bottom:10px}.msg-content p:last-child{margin-bottom:0}
.msg-content ul,.msg-content ol{margin:8px 0 12px 22px}.msg-content li{margin-bottom:4px}
.msg-content strong{color:#fff;font-weight:600}
.msg-content a{color:var(--acc);text-decoration:underline}
.msg-content blockquote{border-left:3px solid var(--acc);padding:4px 16px;margin:10px 0;color:var(--t2);background:rgba(91,140,255,0.06);border-radius:0 6px 6px 0}
.msg-content h1,.msg-content h2,.msg-content h3{font-family:'Space Grotesk',sans-serif;margin:18px 0 8px;font-weight:600}
.msg-content h1{font-size:1.3em}.msg-content h2{font-size:1.15em}.msg-content h3{font-size:1.05em}
.msg-content table{border-collapse:collapse;margin:10px 0;width:100%}
.msg-content th,.msg-content td{border:1px solid var(--border-hi);padding:8px 12px;text-align:left;font-size:14px}
.msg-content th{background:var(--bg-el);font-weight:600}
.user-bubble{background:var(--user-bg);border:1px solid rgba(255,255,255,0.04);border-radius:16px 16px 4px 16px;padding:14px 18px;max-width:75%;word-break:break-word}
.user-bubble .msg-content{font-size:15px}
.ico-avatar{position:relative;flex-shrink:0}
.ico-avatar.thinking::after{content:'';position:absolute;inset:-5px;border-radius:50%;background:var(--acc);opacity:0;animation:avGlow 2s ease-in-out infinite}
@keyframes avGlow{0%,100%{opacity:0;transform:scale(.85)}50%{opacity:.22;transform:scale(1.15)}}
.msg-actions{opacity:0;transition:opacity .2s;display:flex;align-items:center;gap:12px;margin-top:6px;padding:4px 0}
.msg-row:hover .msg-actions{opacity:1}
.ma-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:5px;transition:all .15s;font-family:'Inter',sans-serif}
.ma-btn:hover{color:var(--t1);background:rgba(255,255,255,0.05)}

/* ===== CODE ===== */
.code-block{margin:12px 0;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--code-bg)}
.code-hdr{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--bg-el);font-size:12px;color:var(--t3);font-family:'Space Grotesk',monospace}
.copy-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;padding:2px 8px;border-radius:4px;transition:all .15s;font-family:'Inter',sans-serif}
.copy-btn:hover{color:var(--t1);background:rgba(255,255,255,0.06)}
.code-block pre{margin:0;padding:14px;overflow-x:auto}.code-block code{font-size:13px;line-height:1.6}
.msg-content code:not(.hljs){background:var(--bg-el);padding:2px 7px;border-radius:5px;font-size:.87em;color:var(--acc);font-family:'SF Mono','Fira Code',monospace}

/* ===== INPUT ===== */
#input-bar{border-radius:16px;padding:10px 12px;display:flex;align-items:flex-end;gap:8px;box-shadow:0 4px 50px rgba(91,140,255,0.07),0 0 0 1px var(--border);background:rgba(11,13,20,0.88);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);transition:border-color .2s,box-shadow .2s}
#input-bar:focus-within{border-color:rgba(91,140,255,0.25);box-shadow:0 4px 50px rgba(91,140,255,0.12),0 0 0 1px rgba(91,140,255,0.25)}
#msg-input{flex:1;background:transparent;border:none;color:var(--t1);font-family:'Inter',sans-serif;font-size:15px;resize:none;outline:none;max-height:144px;line-height:1.5;padding:5px 0}
#msg-input::placeholder{color:var(--t3)}
.in-btn{background:none;border:none;color:var(--t3);cursor:pointer;padding:7px;border-radius:8px;transition:all .15s;font-size:15px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.in-btn:hover{color:var(--t1);background:rgba(255,255,255,0.06)}
.in-btn.active{color:var(--acc)}
#send-btn{width:36px;height:36px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--acc-g);color:#fff;opacity:.3;pointer-events:none;transition:opacity .2s,transform .15s}
#send-btn.active{opacity:1;pointer-events:auto}
#send-btn.active:hover{transform:scale(1.06)}
.fp-item{display:inline-flex;align-items:center;gap:8px;background:var(--bg-el);border:1px solid var(--border);border-radius:8px;padding:5px 10px;font-size:12px;color:var(--t2)}
.fp-item img{width:36px;height:36px;object-fit:cover;border-radius:5px}
.fp-rm{background:none;border:none;color:var(--t3);cursor:pointer;padding:2px;font-size:10px}.fp-rm:hover{color:#f87171}
.rec-ind{display:inline-flex;align-items:center;gap:8px;color:#f87171;font-size:13px;font-weight:500}
.rec-dot{width:10px;height:10px;background:#f87171;border-radius:50%;animation:recP 1s ease-in-out infinite}
@keyframes recP{0%,100%{box-shadow:0 0 0 0 rgba(248,113,113,.6)}50%{box-shadow:0 0 0 8px rgba(248,113,113,0)}}
.img-skel{background:linear-gradient(90deg,var(--bg-el) 25%,rgba(255,255,255,0.05) 50%,var(--bg-el) 75%);background-size:200% 100%;animation:shimmer 1.5s ease-in-out infinite;border-radius:12px;width:100%;max-width:420px;aspect-ratio:1}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.gen-img{border-radius:12px;max-width:420px;width:100%;border:1px solid var(--border);cursor:pointer;transition:transform .2s,box-shadow .2s;margin-top:10px}
.gen-img:hover{transform:scale(1.01);box-shadow:0 8px 40px rgba(0,0,0,.3)}
.msg-img{max-width:280px;border-radius:10px;border:1px solid var(--border);margin-top:8px;cursor:pointer}

/* ===== PROFILE CARD ===== */
.profile-card{background:rgba(15,18,32,0.7);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;margin-top:14px;box-shadow:0 4px 30px rgba(91,140,255,0.06);max-width:520px;overflow:hidden;position:relative}
.profile-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--acc-g);border-radius:16px 16px 0 0}
.pc-name{font-weight:700;font-size:17px;color:var(--t1)}
.pc-role{color:var(--t2);font-size:13px;margin-top:2px}
.pc-bio{color:var(--t2);font-size:14px;line-height:1.6;margin-top:14px}
.pc-stitle{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--t3);text-transform:uppercase;margin-top:18px;margin-bottom:10px}
.pc-skills{display:flex;flex-wrap:wrap;gap:6px}
.pc-skill{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;background:rgba(91,140,255,0.08);border:1px solid rgba(91,140,255,0.15);color:var(--acc)}
.pc-loc{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--t3);margin-top:6px}
.soc-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);background:var(--glass);color:var(--t1);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;text-decoration:none}
.soc-btn:hover{border-color:var(--acc);box-shadow:0 0 16px rgba(91,140,255,0.15);background:rgba(91,140,255,0.06)}
.soc-btn i{font-size:15px}

/* ===== CHIPS ===== */
.sug-chip{padding:10px 18px;border-radius:10px;font-size:14px;color:var(--t2);cursor:pointer;transition:all .2s;border:1px solid var(--border);background:var(--glass);backdrop-filter:blur(8px);font-family:'Inter',sans-serif}
.sug-chip:hover{border-color:rgba(91,140,255,0.4);color:var(--t1);background:rgba(91,140,255,0.06)}

/* ===== MODEL BADGE ===== */
.model-badge{font-size:12px;color:var(--t3);cursor:pointer;padding:5px 10px;border-radius:7px;transition:all .15s;border:1px solid transparent;display:flex;align-items:center;gap:6px}
.model-badge:hover{background:rgba(255,255,255,0.04);border-color:var(--border)}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px rgba(61,220,132,.5);animation:sPulse 3s ease-in-out infinite}
@keyframes sPulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ===== LIGHTBOX ===== */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;display:flex;align-items:center;justify-content:center;cursor:zoom-out;opacity:0;pointer-events:none;transition:opacity .25s}
#lightbox.open{opacity:1;pointer-events:all}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:12px;box-shadow:0 20px 80px rgba(0,0,0,.5)}

/* ===== TOAST ===== */
.toast{padding:12px 18px;border-radius:10px;font-size:13px;display:flex;align-items:center;gap:10px;animation:tIn .3s ease forwards;border:1px solid var(--border);background:var(--bg-el);color:var(--t1);max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,.4);font-family:'Inter',sans-serif}
.toast.out{animation:tOut .25s ease forwards}
@keyframes tIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes tOut{to{opacity:0;transform:translateX(30px)}}

*:focus-visible{outline:2px solid var(--acc);outline-offset:2px}
@media(prefers-reduced-motion:reduce){
.ico-3d,.splash-3d{animation:none!important;transform:rotateX(-12deg) rotateY(30deg)!important}
.ico-avatar.thinking::after{animation:none;opacity:.15}
.msg-row,.toast{animation:none!important}
.rec-dot,.img-skel,.splash-bar{animation:none!important}
.splash-text{animation:none!important;opacity:1!important;letter-spacing:22px!important;filter:none!important}
.splash-3d{animation:none!important;opacity:1!important;transform:rotateX(-12deg) rotateY(30deg)!important}
#particles,#splash-canvas{display:none}
.status-dot{animation:none}
.splash-bar-w,.splash-sub{animation:none!important;opacity:1!important}
}
</style>
</head>
<body>

<div id="splash">
<canvas id="splash-canvas"></canvas>
<div class="splash-content">
<div class="splash-3d" id="splash-ico"></div>
<div class="splash-text"><span>ARO</span></div>
<div class="splash-bar-w"><div class="splash-bar"></div></div>
<div class="splash-sub">ADVANCE RESEARCH OPERATOR</div>
</div>
</div>

<canvas id="particles"></canvas>

<div id="app" class="flex h-screen relative" style="z-index:1;height:100dvh;opacity:0;transition:opacity .6s ease">
<aside id="sidebar" role="navigation" aria-label="Conversation history">
<div class="p-5 pb-4">
<div class="flex items-center gap-2.5 mb-5">
<div id="sidebar-ico" style="width:24px;height:24px;flex-shrink:0" aria-hidden="true"></div>
<span class="sidebar-text font-display font-bold text-lg bg-clip-text text-transparent" style="background-image:var(--acc-g)">ARO</span>
<span class="sidebar-text text-[10px] font-display font-medium px-1.5 py-0.5 rounded" style="background:rgba(91,140,255,0.1);color:var(--acc)">v2.1</span>
</div>
<button onclick="createNewChat()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-sm font-medium transition-all sidebar-text" style="border:1px solid var(--border);color:var(--t2);background:transparent" onmouseover="this.style.borderColor='rgba(91,140,255,0.4)';this.style.background='rgba(91,140,255,0.04)'" onmouseout="this.style.borderColor='var(--border)';this.style.background='transparent'">
<i class="fas fa-plus text-xs" style="color:var(--acc)"></i> New chat
</button>
</div>
<div class="px-4 pt-2 pb-1"><span class="sidebar-text font-display text-[11px] font-semibold tracking-widest" style="color:var(--t3)">RECENT</span></div>
<div id="conv-list" class="flex-1 overflow-y-auto px-3 pb-2 pt-1" style="scrollbar-gutter:stable"></div>
<div class="p-4 border-t" style="border-color:var(--border)">
<div class="flex items-center gap-3">
<div class="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0" style="background:linear-gradient(135deg,rgba(91,140,255,0.15),rgba(177,107,255,0.15));border:1px solid rgba(91,140,255,0.2);color:var(--acc)">T</div>
<div class="sidebar-text">
<div class="text-sm font-medium" style="color:var(--t2)">Tasin Saimon</div>
<div class="text-[11px]" style="color:var(--t3)">Creator</div>
</div>
</div>
</div>
</aside>
<div id="sidebar-overlay" onclick="toggleSidebar()"></div>

<main id="main" class="flex-1 flex flex-col min-w-0 relative">
<header class="flex items-center justify-between px-4 md:px-6 h-14 flex-shrink-0" style="z-index:5">
<div class="flex items-center gap-3 min-w-0">
<button class="in-btn md:hidden" onclick="toggleSidebar()" aria-label="Toggle sidebar"><i class="fas fa-bars"></i></button>
<span id="conv-title" class="text-sm truncate" style="color:var(--t2)">New chat</span>
</div>
<div class="flex items-center gap-1.5 flex-shrink-0">
<button id="tts-btn" class="in-btn" onclick="toggleTTS()" title="Toggle voice output" aria-label="Toggle text-to-speech"><i class="fas fa-volume-xmark"></i></button>
<div class="model-badge" onclick="cycleModel()" title="Click to switch model" role="button" tabindex="0">
<span class="status-dot" aria-hidden="true"></span>
<span id="model-label">ARO &middot; online</span>
</div>
</div>
</header>

<div id="messages" class="flex-1 overflow-y-auto" style="padding-bottom:150px">
<div id="msg-inner" class="max-w-[720px] mx-auto px-5 md:px-8 pt-4">
<div id="welcome" class="flex flex-col items-center justify-center text-center" style="min-height:60vh">
<div id="welcome-ico" style="width:110px;height:110px;filter:drop-shadow(0 0 35px rgba(91,140,255,0.2))" aria-hidden="true"></div>
<h1 class="font-display text-[30px] md:text-[32px] font-bold mb-2.5 tracking-tight mt-6">What can I <span class="bg-clip-text text-transparent" style="background-image:var(--acc-g)">help</span> with?</h1>
<p class="text-sm mb-10 max-w-md" style="color:var(--t2);line-height:1.7">Multi-modal AI with streaming text, image generation, voice I/O, and vision analysis.</p>
<div class="flex flex-wrap justify-center gap-3">
<button class="sug-chip" onclick="useSuggestion('Explain quantum computing in simple terms with analogies')"><i class="fas fa-lightbulb mr-2 text-xs" style="color:var(--acc)"></i>Explain quantum computing</button>

/* ================================================================
   3D ICO LOGO BUILDER
   Builds a CSS 3D rotating icosahedron with gradient-stroked faces
================================================================ */
function buildIco3D(size, glowIntensity) {
    const glow = glowIntensity || 0;
    const glowCSS = glow > 0 ? `filter:drop-shadow(0 0 ${glow}px rgba(91,140,255,0.5)) drop-shadow(0 0 ${glow*2}px rgba(177,107,255,0.2));` : '';
    // Icosahedron vertices projected to 2D for each face
    const faces = [
        // Front pentagon area
        {pts:'50,5 93,30 70,50',f:'face-f'},
        {pts:'50,5 70,50 30,50',f:'face-f'},
        {pts:'50,5 30,50 7,30',f:'face-f'},
        // Upper sides
        {pts:'93,30 80,75 70,50',f:'face-r'},
        {pts:'7,30 20,75 30,50',f:'face-l'},
        // Lower
        {pts:'80,75 50,95 70,50',f:'face-bt'},
        {pts:'20,75 50,95 30,50',f:'face-bt'},
        {pts:'80,75 20,75 50,95',f:'face-b'},
        // Cross connections
        {pts:'30,50 70,50 50,95',f:'face-b'},
    ];
    let svg = `<svg viewBox="0 0 100 100" fill="none" width="${size}" height="${size}" style="display:block">`;
    // Outer glow
    svg += `<defs>
        <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#5B8CFF"/><stop offset="100%" stop-color="#B16BFF"/>
        </linearGradient>
        <filter id="glow"><feGaussianBlur stdDeviation="2" result="g"/><feMerge><feMergeNode in="g"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    </defs>`;
    // Draw edges with gradient stroke
    const edges = [
        '50,5 93,30','50,5 7,30','93,30 80,75','7,30 20,75','80,75 50,95','20,75 50,95',
        '50,5 70,50','50,5 30,50','93,30 70,50','7,30 30,50','80,75 70,50','20,75 30,50',
        '50,95 70,50','50,95 30,50','30,50 70,50',
        // Internal wireframe
        '50,5 50,95','93,30 20,75','7,30 80,75','93,30 7,73','7,30 93,73'
    ];
    edges.forEach((e,i) => {
        const [x1,y1,x2,y2] = e.split(' ');
        const op = i < 15 ? (0.35 + (i<6?0.15:0)) : 0.1;
        const w = i < 15 ? (i<6?1.8:1.2) : 0.6;
        svg += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="url(#sg)" stroke-width="${w}" opacity="${op}"/>`;
    });
    // Center core
    svg += `<circle cx="50" cy="50" r="4" fill="url(#sg)" opacity="0.7" filter="url(#glow)"/>`;
    svg += `<circle cx="50" cy="50" r="1.5" fill="#fff" opacity="0.9"/>`;
    // Vertex dots
    const verts = [[50,5],[93,30],[80,75],[20,75],[7,30],[30,50],[70,50],[50,95]];
    verts.forEach(([x,y]) => {
        svg += `<circle cx="${x}" cy="${y}" r="1.8" fill="url(#sg)" opacity="0.5"/>`;
    });
    svg += `</svg>`;

    return `<div class="ico-3d-wrap" style="width:${size}px;height:${size}px;${glowCSS}"><div class="ico-3d" style="width:${size}px;height:${size}px;position:relative;transform-style:preserve-3d">
        <div class="face face-f" style="width:${size}px;height:${size}px;left:0;top:0">${svg}</div>
        <div class="face face-b" style="width:${size}px;height:${size}px;left:0;top:0">${svg}</div>
        <div class="face face-l" style="width:${size}px;height:${size}px;left:0;top:0">${svg}</div>
        <div class="face face-r" style="width:${size}px;height:${size}px;left:0;top:0">${svg}</div>
        <div class="face face-t" style="width:${size}px;height:${size}px;left:0;top:0">${svg}</div>
        <div class="face face-bt" style="width:${size}px;height:${size}px;left:0;top:0">${svg}</div>
    </div></div>`;
}

/* ================================================================
   SPLASH SCREEN with particle convergence
================================================================ */
function initSplash(){
    // Build the 3D ico for splash
    document.getElementById('splash-ico').innerHTML = buildIco3D(120, 40);

    if(RM){ document.getElementById('splash').classList.add('done'); document.getElementById('app').style.opacity='1'; return; }
    const c=document.getElementById('splash-canvas');
    const ctx=c.getContext('2d');
    let w,h,pts=[];
    function resize(){ w=c.width=window.innerWidth; h=c.height=window.innerHeight; }
    resize(); window.addEventListener('resize',resize);

    // Create particles spread across screen
    for(let i=0;i<120;i++){
        const angle=Math.random()*Math.PI*2;
        const dist=150+Math.random()*Math.max(w,h)*0.5;
        pts.push({
            x:w/2+Math.cos(angle)*dist, y:h/2+Math.sin(angle)*dist,
            tx:w/2, ty:h/2, // target = center
            vx:0, vy:0,
            r:Math.random()*1.8+.4,
            o:Math.random()*.4+.15,
            delay:Math.random()*60,
            arrived:false
        });
    }

    let frame=0;
    const convergeStart=30, convergeEnd=160, holdEnd=200;
    const cx=w/2, cy=h/2-30; // slightly above center for the logo

    function draw(){
        ctx.clearRect(0,0,w,h);
        const progress=Math.min(frame/200,1);

        for(let i=0;i<pts.length;i++){
            const p=pts[i];
            const localFrame=Math.max(0,frame-p.delay);

            if(localFrame>0 && localFrame<convergeEnd-convergeStart){
                // Converging phase — move toward center
                const t=Math.min(localFrame/(convergeEnd-convergeStart),1);
                const ease=t<0.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2; // cubic ease in-out
                p.x=p.x+(cx-p.x)*ease*0.08;
                p.y=p.y+(cy-p.y)*ease*0.08;
            }

            // Draw particle
            const alpha=p.o*Math.min(progress*2,1);
            ctx.beginPath();
            ctx.arc(p.x,p.y,p.r*(0.5+progress*0.5),0,Math.PI*2);
            ctx.fillStyle=`rgba(91,140,255,${alpha})`;
            ctx.fill();

            // Connect nearby particles
            for(let j=i+1;j<pts.length;j++){
                const q=pts[j];
                const dx=p.x-q.x,dy=p.y-q.y,dist=Math.sqrt(dx*dx+dy*dy);
                if(dist<100){
                    ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);
                    ctx.strokeStyle=`rgba(91,140,255,${.08*(1-dist/100)*progress})`;
                    ctx.lineWidth=.5;ctx.stroke();
                }
            }

            // Connect to center once close
            const dcx=p.x-cx,dcy=p.y-cy,distC=Math.sqrt(dcx*dcx+dcy*dcy);
            if(distC<120){
                ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(cx,cy);
                ctx.strokeStyle=`rgba(177,107,255,${.06*(1-distC/120)*progress})`;
                ctx.lineWidth=.4;ctx.stroke();
            }
        }

        frame++;
        if(frame<240) requestAnimationFrame(draw);
    }
    draw();

    setTimeout(()=>{ document.getElementById('splash').classList.add('done'); document.getElementById('app').style.opacity='1'; },3000);
}

/* ================================================================
   BACKGROUND PARTICLES
================================================================ */
function initParticles(){
    if(RM) return;
    const c=document.getElementById('particles');
    const ctx=c.getContext('2d');
    let w,h,pts=[];
    function resize(){ w=c.width=window.innerWidth; h=c.height=window.innerHeight; }
    resize(); window.addEventListener('resize',resize);
    
    // Fewer, softer particles
    const n=Math.min(25,Math.floor(w*h/45000));
    for(let i=0;i<n;i++) pts.push({
        x:Math.random()*w, y:Math.random()*h,
        vx:(Math.random()-.5)*0.04, vy:(Math.random()-.5)*0.04, // Much slower movement
        r:Math.random()*1.5+0.5, o:Math.random()*0.15+0.05 // Softer opacity
    });
    
    function draw(){
        ctx.clearRect(0,0,w,h);
        for(let i=0;i<pts.length;i++){
            const p=pts[i]; p.x+=p.vx; p.y+=p.vy;
            if(p.x<0)p.x=w; if(p.x>w)p.x=0; if(p.y<0)p.y=h; if(p.y>h)p.y=0;
            ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
            ctx.fillStyle=`rgba(91,140,255,${p.o})`; ctx.fill();
            
            // Faint, elegant connecting lines
            for(let j=i+1;j<pts.length;j++){
                const q=pts[j]; const dx=p.x-q.x,dy=p.y-q.y,dist=Math.sqrt(dx*dx+dy*dy);
                if(dist<150){
                    ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y);
                    ctx.strokeStyle=`rgba(91,140,255,${0.015*(1-dist/150)})`;
                    ctx.lineWidth=0.5; ctx.stroke();
                }
            }
        }
        requestAnimationFrame(draw);
    }
    draw();
}

    const code=typeof obj==='string'?obj:(obj.text||'');
    const lang=typeof obj==='string'?arguments[1]:(obj.lang||'');
    let hl; try{hl=lang&&hljs.getLanguage(lang)?hljs.highlight(code,{language:lang}).value:hljs.highlightAuto(code).value;}catch(e){hl=esc(code);}

};

function createMsgEl(msg,idx){
    const row=document.createElement('div');row.className='msg-row';row.style.marginBottom='28px';
    if(msg.role==='user'){
        let h=`<div class="flex justify-end"><div class="user-bubble"><div class="msg-content">${esc(msg.content).replace(/\n/g,'<br>')}</div>`;
        if(msg.image)h+=`<img src="${msg.image}" class="msg-img" onclick="openLightbox(this.src)" alt="Uploaded image">`;
        row.innerHTML=h+`</div></div>`;
    } else {
        const tc=msg.loading?' thinking':'';
        let content='';
        if(msg.loading){content='';}
        else{
            content=`<div class="msg-content">${marked.parse(msg.content||'')}</div>`;
            if(msg.imageGenerated)content+=`<img src="${msg.imageGenerated}" class="gen-img" onclick="openLightbox(this.src)" alt="Generated image" loading="lazy">`;
            if(msg.imageLoading)content+=`<div class="img-skel"></div>`;

        const time=msg.timestamp?new Date(msg.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}):'';
        const avHTML = buildIco3D(28, 0);
        row.innerHTML=`<div class="flex gap-3 items-start"><div class="ico-avatar${tc}" style="width:28px;height:28px">${avHTML}</div><div class="flex-1 min-w-0">${content}${!msg.loading?`<div class="msg-actions"><span style="font-size:11px;color:var(--t3)">${time}</span><button class="ma-btn" onclick="copyMsg(${idx})" aria-label="Copy"><i class="far fa-copy"></i> Copy</button><button class="ma-btn" onclick="regenMsg(${idx})" aria-label="Regenerate"><i class="fas fa-rotate"></i> Regen</button></div>`:''}</div></div>`;
    }
    return row;
}

        if(f.type.startsWith('image/')){
            if(f.size>20*1024*1024){toast('Image too large (max 20MB)','error');return;}

        }
    });e.target.value='';

function isImgGen(t){
    const l=t.toLowerCase().trim();
    return [/^(generate|create|draw|make|paint|render|produce)\s+(a\s+|an\s+)?(image|picture|photo|illustration|artwork|painting|drawing|sketch)/i,/^(show me|picture of|image of|visualize|depict|illustrate)\b/i,/\b(generate|create|draw)\b.*\b(image|picture|photo|illustration)\b/i].some(p=>p.test(l));
}

/* ================================================================
   SEND MESSAGE
================================================================ */
async function sendMessage(){
    const text=msgInput.value.trim();
    if(!text&&!S.files.length)return;if(S.gen)return;
    if(!S.activeId)createNewChat();
    const conv=getConv();
    let content=text,image=null;
    
    const tf=S.files.filter(f=>f.type==='text');
    if(tf.length)content=tf.map(f=>`--- ${f.name} ---\n${f.data}`).join('\n\n')+'\n\n'+content;
    const imf=S.files.filter(f=>f.type==='image');
    if(imf.length)image=imf[0].data;

    const wantsToGenerate = isImgGen(text);

    // If user uploads an image AND asks to generate/modify it
    if(wantsToGenerate && image) {
        toast('Image modification requires a different API','warning');
        content += "\n\n[System Note: I see you uploaded an image to modify. However, my current image generation tool (Pollinations) only supports Text-to-Image, not Image-to-Image. I can analyze this image for you, but I cannot directly edit or recreate it.]";
        
        const um={role:'user',content,image,timestamp:Date.now()};
        conv.msgs.push(um);updateTitle(conv);conv.updated=Date.now();
        cleanupInputUI();
        await handleVision(content,image,conv);
        return;
    }

    const um={role:'user',content,timestamp:Date.now()};
    if(image)um.image=image;
    conv.msgs.push(um);updateTitle(conv);conv.updated=Date.now();
    
    cleanupInputUI();

    if(wantsToGenerate) await handleImgGen(text,conv);
    else if(image) await handleVision(content,image,conv);
    else await handleText(content,conv,isProfileReq(text));
}

function cleanupInputUI() {
    msgInput.value='';msgInput.style.height='auto';S.files=[];renderFP();updateSendBtn();
    save();renderSidebar();renderMessages();
}

/* ================================================================
   TEXT
================================================================ */
async function handleText(text,conv,showProfile){
    if(!GROQ_API_KEY||GROQ_API_KEY==='YOUR_GROQ_API_KEY_HERE'){
        addAM(conv,'Please set your Groq API key in the code. Find `GROQ_API_KEY` at the top of the script and replace it with your key from [console.groq.com](https://console.groq.com).',false);
        toast('API key not configured','warning');return;
    }
    const lm={role:'assistant',content:'',timestamp:Date.now(),loading:true};
    conv.msgs.push(lm);renderMessages();
    S.gen=true;S.abort=new AbortController();
    try{
        const full=await streamGroq(buildMsgs(conv),MODELS[modelIdx],S.abort.signal);
        lm.content=full;lm.loading=false;lm.timestamp=Date.now();
        if(showProfile)lm.profileCard=true;
    }catch(e){
        if(e.name==='AbortError')lm.content=lm.content||'*Generation stopped.*';
        else{lm.content=`**Error:** ${e.message}\n\nCheck your API key and try again.`;toast('Request failed','error');}
        lm.loading=false;
    }finally{S.gen=false;S.abort=null;conv.updated=Date.now();save();renderMessages();}
}

/* ================================================================
   VISION
================================================================ */
async function handleVision(text,imgData,conv){
    if(!GROQ_API_KEY||GROQ_API_KEY==='YOUR_GROQ_API_KEY_HERE'){
        addAM(conv,'Please set your Groq API key for image analysis.',false);toast('API key not configured','warning');return;
    }
    const lm={role:'assistant',content:'',timestamp:Date.now(),loading:true};
    conv.msgs.push(lm);renderMessages();
    S.gen=true;S.abort=new AbortController();
    try{
        const sys={role:'system',content:SYSTEM_PROMPT};
        const hist=conv.msgs.filter(m=>!m.loading&&m.role!=='user').slice(0,-2).map(m=>({role:m.role,content:m.content}));
        const vm={role:'user',content:[{type:'text',text:text||'Describe this image in detail.'},{type:'image_url',image_url:{url:imgData}}]};
        const full=await streamGroq([sys,...hist,vm],'meta-llama/llama-4-scout-17b-16e-instruct',S.abort.signal);
        lm.content=full;lm.loading=false;lm.timestamp=Date.now();
    }catch(e){
        if(e.name==='AbortError')lm.content=lm.content||'*Stopped.*';
        else{try{const full=await streamGroq(buildMsgs(conv),MODELS[modelIdx],S.abort.signal);lm.content=full+'\n\n*(Vision unavailable, responded without image analysis)*';}catch(e2){lm.content=`**Error:** ${e.message}`;}}
        lm.loading=false;
    }finally{S.gen=false;S.abort=null;conv.updated=Date.now();save();renderMessages();}
}

/* ================================================================
   IMAGE GENERATION — Fixed
================================================================ */
async function handleImgGen(text,conv){
    let prompt=text.replace(/^(generate|create|draw|make|paint|render|produce|show me|picture of|image of|visualize|depict|illustrate)\s*(a\s+|an\s+|me\s+)?/i,'').trim()||text;
    prompt=prompt.replace(/\b(for\s+me|please|thanks|thank you)\s*$/i,'').trim();
    if(!prompt)prompt='abstract digital art';
    const tm={role:'assistant',content:`Generating image for: **"${prompt}"**`,timestamp:Date.now(),imageLoading:true};
    conv.msgs.push(tm);renderMessages();
    try{
        const seed=Math.floor(Math.random()*999999);
        const encoded=encodeURIComponent(prompt);
        const url=`https://image.pollinations.ai/prompt/${encoded}?width=1024&height=1024&nologo=true&seed=${seed}&model=flux`;
        const loaded=await new Promise(r=>{const img=new Image();img.onload=()=>r(true);img.onerror=()=>r(false);img.src=url;setTimeout(()=>r(false),45000);});
        if(loaded){tm.content=`Here's the generated image for: **"${prompt}"**`;tm.imageGenerated=url;tm.imageLoading=false;tm.timestamp=Date.now();}
        else{
            const url2=`https://image.pollinations.ai/prompt/${encoded}?width=768&height=768&nologo=true&seed=${seed+1}&model=flux`;
            const l2=await new Promise(r=>{const img=new Image();img.onload=()=>r(true);img.onerror=()=>r(false);img.src=url2;setTimeout(()=>r(false),45000);});
            if(l2){tm.content=`Here's the generated image for: **"${prompt}"**`;tm.imageGenerated=url2;tm.imageLoading=false;tm.timestamp=Date.now();}
            else{tm.content=`**Image generation is currently unavailable.** The service may be experiencing high load.\n\nTry again in a moment, or rephrase your prompt.`;tm.imageLoading=false;toast('Image generation failed — try again','warning');}
        }
    }catch(e){tm.content=`**Image generation failed:** ${e.message}`;tm.imageLoading=false;toast('Image generation failed','error');}
    conv.updated=Date.now();save();renderMessages();
}

/* ================================================================
   GROQ STREAMING
================================================================ */
async function streamGroq(messages,model,signal){
    const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${GROQ_API_KEY}`},
        body:JSON.stringify({model,messages,stream:true,temperature:.7,max_tokens:4096}),signal
    });
    if(!res.ok){
        const b=await res.text().catch(()=>'');
        if(res.status===401)throw new Error('Invalid API key. Replace GROQ_API_KEY in the code.');
        if(res.status===429)throw new Error('Rate limited. Wait a few seconds and try again.');
        if(res.status===503)throw new Error('Groq temporarily unavailable. Try again shortly.');
        if(res.status===400)throw new Error('Bad request. The model may not support this input type.');
        throw new Error(`API error ${res.status}: ${b.substring(0,200)}`);
    }
    const reader=res.body.getReader(),dec=new TextDecoder();
    let buf='',full='',conv=getConv(),lm=conv?.msgs[conv.msgs.length-1];
    if(lm){lm.loading=false;if(!RM)renderMessages();}
    while(true){
        const {done,value}=await reader.read();if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split('\n');buf=lines.pop()||'';
        for(const line of lines){
            const t=line.trim();if(!t||!t.startsWith('data: '))continue;
            const d=t.slice(6);if(d==='[DONE]')break;
            try{const p=JSON.parse(d);const delta=p.choices?.[0]?.delta?.content;
                if(delta){full+=delta;if(lm)lm.content=full;if(!RM)updateLastMsg(full);}
            }catch(e){}
        }
    }
    if(RM&&lm)lm.content=full;
    return full;
}
function buildMsgs(conv){
    const m=[{role:'system',content:SYSTEM_PROMPT}];
    conv.msgs.filter(x=>!x.loading&&!x.imageGenerated&&!x.imageLoading&&!x.profileCard).slice(-20).forEach(x=>m.push({role:x.role,content:x.content}));
    return m;
}
function addAM(conv,content){conv.msgs.push({role:'assistant',content,timestamp:Date.now(),loading:false});conv.updated=Date.now();save();renderMessages();}

/* ================================================================
   MESSAGE ACTIONS
================================================================ */
function copyMsg(idx){const c=getConv();if(!c)return;const m=c.msgs[idx];if(m)navigator.clipboard.writeText(m.content).then(()=>toast('Copied','success'));}
function regenMsg(idx){
    if(S.gen)return;const conv=getConv();if(!conv)return;
    let um=null;for(let i=idx-1;i>=0;i--){if(conv.msgs[i].role==='user'){um=conv.msgs[i];break;}}
    if(!um)return;conv.msgs.splice(idx);
    if(isImgGen(um.content))handleImgGen(um.content,conv);
    else if(um.image)handleVision(um.content,um.image,conv);
    else handleText(um.content,conv,isProfileReq(um.content));
}

/* ================================================================
   VOICE INPUT
================================================================ */
function toggleVoice(){S.rec?stopVoice():startVoice();}
function startVoice(){
    const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
    if(!SR){toast('Speech recognition not supported in this browser','error');return;}
    S.recog=new SR();S.recog.continuous=false;S.recog.interimResults=true;S.recog.lang='en-US';
    S.recog.onstart=()=>{S.rec=true;document.getElementById('rec-indicator').style.display='block';document.getElementById('voice-btn').classList.add('active');document.getElementById('voice-btn').style.color='#f87171';};
    S.recog.onresult=(e)=>{let t='';for(let i=0;i<e.results.length;i++)t+=e.results[i][0].transcript;msgInput.value=t;autoGrow(msgInput);updateSendBtn();};
    S.recog.onend=()=>{stopVoice();if(msgInput.value.trim())sendMessage();};
    S.recog.onerror=(e)=>{stopVoice();if(e.error==='not-allowed')toast('Microphone access denied','error');else if(e.error!=='aborted')toast('Speech error: '+e.error,'error');};
    S.recog.start();
}
function stopVoice(){
    S.rec=false;document.getElementById('rec-indicator').style.display='none';
    document.getElementById('voice-btn').classList.remove('active');document.getElementById('voice-btn').style.color='';
    if(S.recog){try{S.recog.stop();}catch(e){}S.recog=null;}
}

/* ================================================================
   TTS
================================================================ */
function toggleTTS(){
    S.tts=!S.tts;const b=document.getElementById('tts-btn');
    b.innerHTML=S.tts?'<i class="fas fa-volume-high"></i>':'<i class="fas fa-volume-xmark"></i>';
    b.style.color=S.tts?'var(--acc)':'';
    if(!S.tts)window.speechSynthesis?.cancel();
    toast(S.tts?'Voice output enabled':'Voice output disabled','info');
}
function speakText(text){
    if(!S.tts||!window.speechSynthesis)return;window.speechSynthesis.cancel();
    const clean=text.replace(/[#*`_~\[\]()]/g,'').replace(/\n+/g,'. ').substring(0,2000);
    if(!clean.trim())return;
    const u=new SpeechSynthesisUtterance(clean);u.rate=1;u.pitch=1;
    const v=window.speechSynthesis.getVoices();
    const p=v.find(x=>x.name.includes('Samantha')||x.name.includes('Google UK English Female')||(x.lang.startsWith('en')&&x.name.includes('Female')));
    if(p)u.voice=p;window.speechSynthesis.speak(u);
}
const mObs=new MutationObserver(mutations=>{
    mutations.forEach(m=>{m.addedNodes.forEach(n=>{
        if(n.classList?.contains('msg-row')){
            const c=n.querySelector('.msg-content');const av=n.querySelector('.ico-avatar');
            if(c&&av&&!n.querySelector('.thinking')&&c.textContent.trim())speakText(c.textContent);
        }
    });});
});
mObs.observe(document.getElementById('msg-inner'),{childList:true});

/* ================================================================
   MODEL CYCLE
================================================================ */
function cycleModel(){
    modelIdx=(modelIdx+1)%MODELS.length;
    document.getElementById('model-label').textContent=`${MODEL_LABELS[modelIdx]} · online`;
    toast(`Switched to ${MODEL_LABELS[modelIdx]}`,'info');
}

/* ================================================================
   UI
================================================================ */
function openLightbox(src){document.getElementById('lb-img').src=src;document.getElementById('lightbox').classList.add('open');}
function closeLightbox(){document.getElementById('lightbox').classList.remove('open');}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('sidebar-overlay').classList.toggle('open');}
function closeSidebarMobile(){if(window.innerWidth<768){document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');}}
document.addEventListener('keydown',e=>{
    if(e.key==='Escape'){closeLightbox();if(S.gen&&S.abort)S.abort.abort();}
    if(e.ctrlKey&&e.shiftKey&&e.key==='N'){e.preventDefault();createNewChat();}
});

   INIT
================================================================ */

    load();renderSidebar();renderMessages();

    // Place 3D ico logos
    document.getElementById('sidebar-ico').innerHTML = buildIco3D(24, 0);
    document.getElementById('welcome-ico').innerHTML = buildIco3D(110, 25);

    msgInput.focus();
    if(GROQ_API_KEY==='YOUR_GROQ_API_KEY_HERE')setTimeout(()=>toast('SomeThing went Wrong'),3400);
}
document.readyState==='loading'?document.addEventListener('DOMContentLoaded',init):init();
